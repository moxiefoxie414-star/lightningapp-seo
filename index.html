<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Lightning Studio | Premium Copywriting Vault & Token Matrix</title>
    <meta name="description" content="Automate high-converting copy using premium prompt frameworks. Format scripts, execute luxury brand manifestos, and accurately track token weights 100% locally and privately.">
    <meta name="keywords" content="copywriting vault, prompt frameworks, social caption matrix, luxury brand manifesto, token calculator, openai token counter, claude token estimation, private prompt sandbox">
    <script src="https://tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main-workspace {
            display: flex;
            gap: 30px;
            max-width: 1050px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .panel {
            background-color: #111827;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #1f2937;
            box-sizing: border-box;
        }
        .counter-panel { flex: 1; min-width: 320px; }
        h1 { font-size: 24px; color: #38bdf8; margin-top: 0; margin-bottom: 5px; font-weight: 600; }
        .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 25px; letter-spacing: 0.5px; }
        textarea {
            width: 100%;
            height: 180px;
            background-color: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            color: #f3f4f6;
            padding: 15px;
            font-size: 15px;
            outline: none;
            resize: none;
            box-sizing: border-box;
            transition: 0.2s;
        }
        textarea:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-box { background-color: #1f2937; padding: 15px; border-radius: 12px; border: 1px solid #374151; }
        .stat-num { font-size: 20px; font-weight: bold; color: #38bdf8; font-family: monospace; }
        .stat-label { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        .privacy-badge { margin-top: 25px; font-size: 12px; color: #10b981; background-color: rgba(16, 185, 129, 0.1); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2); display: inline-block; font-weight: 500; text-align: center; }
        footer { margin-top: 40px; color: #4b5563; font-size: 12px; letter-spacing: 0.5px; }
        select { transition: 0.2s; }
        select:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body>

    <div class="main-workspace">
        <div class="panel counter-panel">
            <h1>Prompt Core Matrix</h1>
            <div class="subtitle">100% LOCAL BROWSER SANDBOX RUNNING</div>
            
            <div style="margin-bottom: 25px;">
                <label for="templateSelect" style="font-size: 11px; color: #9ca3af; display: block; margin-bottom: 8px; letter-spacing: 1px; font-weight: 600;">SELECT PREMIUM VAULT FRAMEWORK</label>
                <select id="templateSelect" style="width: 100%; background-color: #1f2937; border: 1px solid #374151; border-radius: 12px; color: #f3f4f6; padding: 14px; font-size: 14px; outline: none; cursor: pointer; border: 1px solid #374151;">
                    <option value="">-- Select a Blank Canvas --</option>
                    <option value="hook">⚡ Vault Slot 1: The Viral IG Hook Generator</option>
                    <option value="pastor">💼 Vault Slot 2: P.A.S.T.O.R. Sales Page Framework</option>
                    <option value="pitch">🎯 Vault Slot 3: High-Ticket Client Pitch Deck</option>
                    <option value="caption">📝 Vault Slot 4: Social Media Caption Matrix</option>
                    <option value="manifesto">💎 Vault Slot 5: Luxury Brand Manifesto Template</option>
                </select>
            </div>

            <textarea id="promptInput" placeholder="Paste your proprietary prompt or engineering code strings here to evaluate structure..."></textarea>
            
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-num" id="charCount">0</div><div class="stat-label">Total Characters</div></div>
                <div class="stat-box"><div class="stat-num" id="wordCount">0</div><div class="stat-label">Word Units</div></div>
                <div class="stat-box"><div class="stat-num" id="tokenEst">0</div><div class="stat-label">Est. Tokens (OpenAI)</div></div>
                <div class="stat-box"><div class="stat-num" id="claudeEst">0</div><div class="stat-label">Est. Tokens (Claude)</div></div>
            </div>
            <div style="text-align: center;"><div class="privacy-badge">🔒 Enterprise Data Shield Active: 0 Bits Sent to Cloud</div></div>
        </div>
    </div>

    <footer>PROMPT LIGHTNING LABS © 2026 • SECURITY VERIFIED BY VERCEL SHIELD</footer>

    <script>
        const promptInput = document.getElementById('promptInput');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const tokenEst = document.getElementById('tokenEst');
        const claudeEst = document.getElementById('claudeEst');
        const templateSelect = document.getElementById('templateSelect');
        
        const vaultTemplates = {
            hook: "Act as an Elite Social Media Copywriter and Human Behavior Expert.\nI am going to give you a core topic, and you will generate 5 high-converting Instagram Reel hooks designed to stop the scroll in under 3 seconds using strict curiosity loops.\n\n[PREMIUM SETTINGS]: Optimize for a slow, deliberate reading cadence. Maintain a low-tonality, quiet-luxury voice. Strictly forbid all exclamation marks, emojis, or marketing hype words.\n\nCore Topic Input: [ENTER YOUR TOPIC HERE]",
            
            pastor: "Act as a Master Conversion Copywriter.\nI am going to give you a product or service name, and you will structure a high-converting long-form sales page using the strict P.A.S.T.O.R. copywriting framework.\n\n[PREMIUM SETTINGS]: Apply strict spatial padding. Maximum of 2 sentences per text block. Enforce double line breaks between all paragraphs to maximize negative space. Avoid all hype words.\n\nProduct/Service Input: [ENTER YOUR OFFER HERE]",
            
            pitch: "Act as an Elite Business Development Director and Master B2B Copywriter.\nI am going to give you a Target Client Company and the Service I Offer. You will generate a hyper-targeted, minimalist cold outreach email under 120 words using the 'Peer-to-Peer Inverse Pitch' framework.\n\n[PREMIUM SETTINGS]: Utilize cognitive curiosity loops. The opening line must highlight a subtle, overlooked friction point. Keep the tone sophisticated, calm, and free of sales jargon.\n\nTarget Client Company Input: [ENTER TARGET CLIENT HERE]\nService Offered Input: [ENTER YOUR SERVICE HERE]",
            
            caption: "Act as an Elite Editorial Typographer and Social Media Layout Expert.\nI am going to give you raw, unformatted notes or text. You will restructure this content into a premium, single-column social caption utilizing strict visual spatial padding rules.\n\n[PREMIUM SETTINGS]: Enforce strict spatial padding. Maximum of 2 sentences per text block. Enforce double line breaks between distinct thoughts to maximize negative space.\n\nRaw Text Input: [ENTER RAW CAPTION TEXT HERE]",
            
            manifesto: "Act as a Luxury Brand Strategist and Master Editorial Copywriter.\nI am going to give you a Core Product or Philosophy. You will generate a high-end brand manifesto structured for a website landing page header.\n\n[PREMIUM SETTINGS]: Use extremely brief, rhythmic, and poetic sentence structures. Avoid all modern marketing words like 'solution' or 'best'. Lean heavily on themes of stillness and raw materials.\n\nCore Philosophy Input: [ENTER BRAND PHILOSOPHY HERE]"
        };

        promptInput.addEventListener('input', () => {
            const text = promptInput.value;
            charCount.innerText = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            wordCount.innerText = words;
            tokenEst.innerText = Math.ceil(text.length / 4);
            claudeEst.innerText = Math.ceil(text.length / 3.5);
        });

        templateSelect.addEventListener('change', () => {
            const selectedValue = templateSelect.value;
            if (selectedValue && vaultTemplates[selectedValue]) {
                promptInput.value = vaultTemplates[selectedValue];
                promptInput.dispatchEvent(new Event('input'));
            } else {
                promptInput.value = '';
                promptInput.dispatchEvent(new Event('input'));
            }
        });
    </script>
</body>
</html>
