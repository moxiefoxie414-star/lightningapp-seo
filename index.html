<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning AI Token & Prompt Utility</title>
  <meta name="description" content="Optimize layouts, format templates, and accurately estimate token weights for OpenAI, Claude, and Gemini templates using raw local script processing.">
  <script src="https://tailwindcss.com"></script>

  <!-- Google Analytics Tracking (GA4) -->
  <script async src="https://googletagmanager.com"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TRACKING_ID');
  </script>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { 
      (window.vaq = window.vaq || []).push(arguments); 
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; padding: 2rem 1rem; box-sizing: border-box; }
        .container { max-w: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; flex-grow: 1; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; font-weight: 800; color: #22d3ee; margin: 0 0 0.5rem 0; letter-spacing: -0.025em; }
        header p { color: #94a3b8; margin: 0; font-size: 1rem; }
        main { background-color: #111827; border: 1px solid #1f2937; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); display: flex; flex-direction: column; flex-grow: 1; margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; background-color: #030712; padding: 1rem; border-radius: 0.75rem; border: 1px solid #1f2937; text-align: center; margin-bottom: 1.5rem; }
        .stat-item span:first-child { display: block; color: #64748b; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.05em; font-weight: 700; margin-bottom: 0.25rem; }
        .stat-cyan { color: #22d3ee; font-size: 1.25rem; font-weight: 700; }
        .stat-indigo { color: #818cf8; font-size: 1.25rem; font-weight: 700; }
        .stat-emerald { color: #34d399; font-size: 1.25rem; font-weight: 700; }
        textarea { width: 100%; flex-grow: 1; min-height: 250px; padding: 1rem; background-color: #030712; border: 1px solid #1f2937; border-radius: 0.75rem; color: #e2e8f0; font-family: monospace; font-size: 0.875rem; resize: none; box-sizing: border-box; outline: none; }
        textarea:focus { border-color: #22d3ee; }
        .button-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; margin-top: 1.5rem; }
        @media (min-width: 640px) { .button-grid { grid-template-columns: repeat(3, 1fr); } }
        button { border: none; padding: 0.875rem 1rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s ease; }
        .btn-indigo { background-color: #4f46e5; color: white; }
        .btn-indigo:hover { background-color: #4338ca; }
        .btn-slate { background-color: #1f2937; color: #e2e8f0; border: 1px solid #374151; }
        .btn-slate:hover { background-color: #374151; }
        .btn-cyan { background-color: #22d3ee; color: #0f172a; font-weight: 700; }
        .btn-cyan:hover { background-color: #06b6d4; }
        footer { text-align: center; color: #475569; font-size: 0.75rem; }
        .ad-slot { background-color: #030712; border: 1px dashed #374151; padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 1rem; color: #64748b; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Lightning AI Prompt Tool</h1>
            <p>No Logins. Frictionless Real-Time Formatting, Token Estimates, & Clean Prompts.</p>
        </header>
        <main>
            <div class="stats-grid">
                <div class="stat-item"><span>Est. Tokens</span><span id="tokenCount" class="stat-cyan">0</span></div>
                <div class="stat-item"><span>Words</span><span id="wordCount" class="stat-indigo">0</span></div>
                <div class="stat-item"><span>Characters</span><span id="charCount" class="stat-emerald">0</span></div>
            </div>
            <textarea id="mainInput" placeholder="Paste your raw text, prompt, markdown, or code script here..."></textarea>
            <div class="button-grid">
                <button onclick="wrapAsSystemPrompt()" class="btn-indigo">📝 Wrap as System Prompt</button>
                <button onclick="cleanCodeSpacing()" class="btn-slate">⚡ Clean Code Spacing</button>
                <button onclick="copyToClipboard()" class="btn-cyan">📋 Copy Final Output</button>
            </div>
        </main>
        <footer>
            <div class="ad-slot">[ Google AdSense High-CPC Responsive Banner Slot ]</div>
            <p>&copy; LightningAI Utility Portfolio. Hosted Serverless Globally.</p>
        </footer>
    </div>
    <script>
        const mainInput = document.getElementById('mainInput'), tokenCount = document.getElementById('tokenCount'), wordCount = document.getElementById('wordCount'), charCount = document.getElementById('charCount');
        mainInput.addEventListener('input', () => {
            const text = mainInput.value; charCount.innerText = text.length;
            const words = text.trim() === "" ? 0 : text.trim().split(/\s+/).length; wordCount.innerText = words;
            tokenCount.innerText = text.trim() === "" ? 0 : Math.ceil(text.length / 3.8);
        });
        function wrapAsSystemPrompt() { if(!mainInput.value.trim()) return; mainInput.value = `You are an expert AI Assistant.\n\n[CONTEXT & TASK]:\n\${mainInput.value}\n\n[INSTRUCTIONS]:\nProvide a well-structured response keeping strict markdown integrity.`; mainInput.dispatchEvent(new Event('input')); }
        function cleanCodeSpacing() { if(!mainInput.value.trim()) return; mainInput.value = mainInput.value.replace(/\n{3,}/g, '\n\n').trim(); mainInput.dispatchEvent(new Event('input')); }
        function copyToClipboard() { if(!mainInput.value.trim()) return; navigator.clipboard.writeText(mainInput.value); alert("Copied successfully!"); }
    </script>
</body>
</html>
