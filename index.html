<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Lightning Studio | Premium Copywriting Vault & Token Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; font-family: system-ui, -apple-system, sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="text-slate-100 min-h-screen py-8 px-4">
    <div class="max-w-7xl mx-auto space-y-8">
        <header class="text-center space-y-3 pb-4 border-b border-slate-800">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400">PROMPT LIGHTNING STUDIO</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- LEFT COLUMN: DYNAMIC ENGINE -->
            <div class="lg:col-span-5 space-y-6">       
                <div class="glass-panel p-6 rounded-2xl shadow-xl space-y-6">
                    <h2 class="text-lg font-bold text-indigo-300">✨ Dynamic Variable Engine</h2>
                    <div id="dynamic-inputs-container" class="space-y-4">
                        <p class="text-slate-500 text-sm">Select a template to auto-generate input fields...</p>
                    </div>
                    <button onclick="runAiGeneration()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white py-3 rounded-xl font-bold transition">
                        🤖 AI-Draft Generation
                    </button>
                </div>
            </div>

            <!-- RIGHT COLUMN: WORKSPACE -->
            <div class="lg:col-span-7 space-y-6">
                <div class="glass-panel p-6 rounded-2xl shadow-xl space-y-4">
                    <select id="template-dropdown" onchange="loadSelectedTemplate()" class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm text-slate-100"></select>
                    
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="copyToClipboard()" class="bg-slate-800 p-2 rounded-lg text-xs">📋 Copy</button>
                        <button onclick="downloadMarkdown()" class="bg-slate-800 p-2 rounded-lg text-xs">📥 .MD</button>
                        <button onclick="downloadWordDoc()" class="bg-blue-900/40 p-2 rounded-lg text-xs text-blue-300">📝 Doc</button>
                        <button onclick="exportPDF()" class="bg-red-900/40 p-2 rounded-lg text-xs text-red-300">📄 PDF</button>
                    </div>

                    <textarea id="prompt-workspace" oninput="handleManualInput()" rows="14" class="w-full bg-slate-950/80 border border-slate-800 rounded-xl p-4 text-slate-200 text-sm"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PRELOADED_TEMPLATES = {
            'viral-hook': `[Topic] [Audience] [Style]\n\n🎯 VIRAL HOOK:\n"Everyone tells you to work harder to get [Goal] results, but they aren't telling you about [Product]..."`,
            'landing-page': `[Headline] [Benefit] [CTA]\n\n🚀 AIDA PAGE:\nAttention: [Headline]\nInterest: Why [Audience] need [Product].\nDesire: Imagine [Benefit].\nAction: [CTA]`
        };

        const workspace = document.getElementById('prompt-workspace');
        const dropdown = document.getElementById('template-dropdown');
        const container = document.getElementById('dynamic-inputs-container');
        let lastVars = [];

        function parseVariables(text) {
            const regex = /\[(.*?)\]/g;
            const matches = text.match(regex) || [];
            return [...new Set(matches.map(m => m.replace(/[\[\]]/g, '')))];
        }

        function renderInputs(text) {
            const vars = parseVariables(text);
            // Smart check: Only re-render if the variable list actually changes
            if (JSON.stringify(vars) === JSON.stringify(lastVars)) return;
            
            lastVars = vars;
            container.innerHTML = vars.length > 0 ? '' : '<p class="text-slate-500 text-sm">No variables detected in template.</p>';
            
            vars.forEach(v => {
                const div = document.createElement('div');
                div.className = 'space-y-1';
                div.innerHTML = `<label class="block text-xs uppercase text-slate-400 font-semibold">${v}</label>
                                 <input type="text" data-var="${v}" oninput="updateTemplateFromInputs()" class="w-full bg-slate-900 border border-slate-800 rounded px-3 py-2 text-sm text-slate-100">`;
                container.appendChild(div);
            });
        }

        function updateTemplateFromInputs() {
            let text = PRELOADED_TEMPLATES[dropdown.value] || workspace.value;
            const inputs = container.querySelectorAll('input');
            inputs.forEach(input => {
                const varName = input.getAttribute('data-var');
                const val = input.value || `[${varName}]`;
                const regex = new RegExp(`\\[${varName}\\]`, 'g');
                text = text.replace(regex, val);
            });
            workspace.value = text;
        }

        function loadSelectedTemplate() {
            const val = dropdown.value;
            if (val === 'blank') { workspace.value = ''; container.innerHTML = ''; return; }
            workspace.value = PRELOADED_TEMPLATES[val] || '';
            renderInputs(workspace.value);
        }

        Object.keys(PRELOADED_TEMPLATES).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key; opt.innerText = key;
            dropdown.appendChild(opt);
        });

        function handleManualInput() { renderInputs(workspace.value); }
        
        function copyToClipboard() { navigator.clipboard.writeText(workspace.value); }
        function downloadMarkdown() { const blob = new Blob([workspace.value], {type:'text/markdown'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='draft.md'; a.click(); }
        function downloadWordDoc() { const blob = new Blob([workspace.value], {type:'application/msword'}); const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='draft.doc'; a.click(); }
        function exportPDF() { window.print(); }
        async function runAiGeneration() { alert("AI Generation triggered."); }
    </script>
</body>
</html>
